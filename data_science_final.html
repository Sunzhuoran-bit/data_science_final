<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>data_science_final</title>
    <style>
:root {
  --bg: #f4f7f4;
  --panel: #ffffff;
  --panel-2: #eef2ef;
  --text: #1d2520;
  --muted: #66706a;
  --line: #d8ded9;
  --green: #1f7a4d;
  --green-soft: #e6f2eb;
  --blue: #3157d5;
  --blue-soft: #e8edff;
  --amber: #a85d18;
  --amber-soft: #fff0df;
  --red: #a33a3a;
  --red-soft: #fae7e7;
  --ink: #27312b;
  font-family: Inter, "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background:
    linear-gradient(90deg, rgba(29, 37, 32, 0.035) 1px, transparent 1px) 0 0 / 28px 28px,
    linear-gradient(180deg, rgba(29, 37, 32, 0.025) 1px, transparent 1px) 0 0 / 28px 28px,
    var(--bg);
  color: var(--text);
}

button,
input,
textarea {
  font: inherit;
}

button {
  border: 1px solid var(--line);
  background: var(--panel);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  min-height: 40px;
  transition:
    border-color 160ms ease,
    background 160ms ease,
    color 160ms ease,
    box-shadow 160ms ease,
    transform 160ms ease;
}

button:hover {
  border-color: var(--green);
}

button:focus-visible {
  outline: 3px solid rgba(31, 122, 77, 0.24);
  outline-offset: 2px;
}

.app-shell {
  min-height: 100vh;
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  display: grid;
  grid-template-columns: minmax(230px, 1fr) minmax(520px, 760px);
  gap: 18px;
  align-items: center;
  padding: 16px 28px;
  border-bottom: 1px solid rgba(216, 222, 217, 0.9);
  background: rgba(251, 252, 248, 0.94);
  backdrop-filter: blur(12px);
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 0;
  padding: 0;
  border: 0;
  background: transparent;
  text-align: left;
}

.brand-mark {
  position: relative;
  width: 46px;
  height: 46px;
  border-radius: 8px;
  display: flex;
  align-items: end;
  justify-content: center;
  overflow: hidden;
  padding: 10px;
  background: linear-gradient(145deg, #1d2520, #30443a);
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
}

.logo-bars {
  display: flex;
  align-items: end;
  gap: 4px;
  height: 26px;
}

.logo-bars i {
  display: block;
  width: 6px;
  border-radius: 4px 4px 1px 1px;
  transform-origin: bottom;
  animation: logoBar 3.4s ease-in-out infinite;
}

.logo-bars i:nth-child(1) {
  height: 11px;
  background: #d9f1df;
}

.logo-bars i:nth-child(2) {
  height: 18px;
  background: #f5f6f3;
  animation-delay: 140ms;
}

.logo-bars i:nth-child(3) {
  height: 26px;
  background: #f2b66d;
  animation-delay: 280ms;
}

.logo-dot {
  position: absolute;
  top: 9px;
  right: 9px;
  width: 7px;
  height: 7px;
  border-radius: 999px;
  background: #73c58c;
  box-shadow: 0 0 0 5px rgba(115, 197, 140, 0.12);
}

.brand h1,
.brand p,
.topbar h2,
.topbar p {
  margin: 0;
}

.brand h1 {
  font-size: 22px;
  letter-spacing: 0;
}

.brand p,
.topbar p,
.source-line,
.question-meta,
.stats-row label {
  color: var(--muted);
}

.top-nav,
.nav {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  min-width: 0;
}

.nav-button.active,
.topic-button.active,
.question-list button.active,
.question-map button.active {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}

.top-nav {
  grid-template-columns: repeat(6, minmax(0, 1fr));
}

.top-nav .nav-button {
  min-width: 0;
  background: #fbfcf8;
  font-weight: 700;
}

.top-nav .nav-button:hover,
.question-map button:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(29, 37, 32, 0.08);
}

.topic-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: auto;
}

.topic-button {
  display: flex;
  justify-content: space-between;
  align-items: center;
  text-align: left;
  gap: 10px;
  padding: 10px 12px;
}

.topic-button span {
  line-height: 1.35;
}

.topic-button strong {
  font-size: 13px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--panel-2);
  color: var(--text);
}

.topic-button.active strong {
  background: rgba(255, 255, 255, 0.22);
  color: #fff;
}

.main {
  width: min(1180px, calc(100% - 40px));
  margin: 0 auto;
  padding: 28px 0 44px;
  min-width: 0;
}

.topbar {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: center;
  margin-bottom: 20px;
}

.topbar h2 {
  font-size: 28px;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(4, minmax(82px, 1fr));
  gap: 10px;
}

.metrics div,
.stats-row div,
.diagnosis div,
.history-list article,
.source-grid a,
.exam-question,
.question-panel,
.empty-state,
.exam-banner,
.exam-result,
.source-panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.metrics div {
  padding: 10px 12px;
}

.metrics span,
.stats-row span {
  display: block;
  font-size: 20px;
  font-weight: 800;
}

.metrics label,
.stats-row label {
  display: block;
  font-size: 12px;
  margin-top: 2px;
}

.practice-layout {
  display: grid;
  grid-template-columns: 308px minmax(0, 1fr);
  gap: 16px;
  align-items: start;
}

.question-map {
  position: sticky;
  top: 100px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
  gap: 6px;
  max-height: calc(100vh - 126px);
  overflow: auto;
  padding: 12px;
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid var(--line);
  border-radius: 8px;
}

.question-map button {
  min-height: 34px;
  padding: 0;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.question-map span {
  display: block;
}

.question-panel,
.exam-question,
.exam-result,
.source-panel,
.empty-state {
  padding: 18px;
}

.question-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 13px;
}

.question-meta span {
  background: var(--panel-2);
  border-radius: 999px;
  padding: 3px 9px;
}

.question-meta .difficulty-easy {
  color: #17613d;
  background: var(--green-soft);
}

.question-meta .difficulty-medium {
  color: #805016;
  background: var(--amber-soft);
}

.question-meta .difficulty-hard {
  color: #8f2f2f;
  background: var(--red-soft);
}

h3 {
  margin: 0 0 16px;
  font-size: 18px;
  line-height: 1.55;
  letter-spacing: 0;
}

.answer-grid,
.option-stack {
  display: grid;
  gap: 10px;
}

.answer-grid {
  grid-template-columns: repeat(2, minmax(120px, 1fr));
}

.answer-grid label,
.option-stack label {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfbf8;
  line-height: 1.5;
}

.option-stack input,
.answer-grid input {
  margin-top: 5px;
}

.text-answer,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 12px;
  resize: vertical;
  background: #fbfbf8;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 16px 0;
}

.actions button,
.exam-banner button {
  padding: 0 14px;
}

.primary {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}

.result {
  border-radius: 8px;
  padding: 14px;
  margin: 14px 0;
}

.result.correct {
  background: var(--green-soft);
  border: 1px solid #b9d8c5;
}

.result.wrong {
  background: var(--red-soft);
  border: 1px solid #efbcbc;
}

.result.pending {
  background: var(--amber-soft);
  border: 1px solid #e7c391;
}

.result p {
  margin: 8px 0 0;
  line-height: 1.55;
}

.result p:first-child {
  margin-top: 0;
}

.result strong {
  font-weight: 800;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 16px;
}

.stats-row div {
  padding: 10px;
}

.source-line {
  display: block;
  margin-top: 16px;
  font-size: 13px;
}

.exam-panel,
.history-list,
.source-panel {
  display: grid;
  gap: 14px;
}

.exam-banner {
  padding: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}

.exam-banner h3,
.exam-banner p {
  margin: 0;
}

.exam-list {
  display: grid;
  gap: 14px;
}

.exam-result h3 {
  font-size: 26px;
}

.diagnosis {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 10px;
}

.diagnosis div {
  padding: 12px;
}

.diagnosis strong,
.diagnosis span,
.diagnosis b {
  display: block;
}

.diagnosis p {
  margin: 8px 0 0;
  color: var(--muted);
}

.answer-key {
  margin-top: 16px;
  display: grid;
  gap: 8px;
}

details {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  background: #fbfbf8;
}

summary {
  cursor: pointer;
  font-weight: 700;
}

.history-list article {
  padding: 16px;
}

.history-list h3 {
  margin-bottom: 8px;
}

.diagnosis.mini {
  margin-top: 10px;
}

.source-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.source-grid a {
  color: var(--text);
  text-decoration: none;
  padding: 14px;
}

.source-grid span {
  color: var(--muted);
  display: block;
  margin-top: 6px;
}

.evidence-list {
  margin: 0;
  padding-left: 20px;
  line-height: 1.7;
}

.empty-state {
  color: var(--muted);
}

.app-shell.view-home .main {
  min-height: calc(100vh - 79px);
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  justify-items: center;
  align-content: center;
  gap: 18px;
  padding: 32px 0;
}

.home-panel {
  isolation: isolate;
  position: relative;
  display: grid;
  grid-template-columns: 1fr;
  justify-items: center;
  gap: 28px;
  width: min(980px, 100%);
  max-width: 100%;
  min-width: 0;
  margin: 0 auto;
  overflow: hidden;
  padding: 56px 48px 44px;
  border: 1px solid #24483b;
  border-radius: 8px;
  background: linear-gradient(145deg, #12231d 0%, #1e382f 62%, #29473a 100%);
  color: #f7faf7;
  text-align: center;
  box-shadow: 0 22px 50px rgba(20, 39, 31, 0.14);
  animation: enterUp 420ms ease both;
}

.home-panel::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.07) 1px, transparent 1px) 0 0 / 34px 34px,
    linear-gradient(180deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px) 0 0 / 34px 34px,
    linear-gradient(120deg, rgba(115, 197, 140, 0.2), transparent 42%);
  opacity: 0.9;
  animation: panelSheen 7s ease-in-out infinite alternate;
}

.home-panel::after {
  content: none;
}

.hero-copy,
.home-stats {
  position: relative;
  z-index: 1;
}

.hero-copy span {
  display: inline-flex;
  margin-bottom: 12px;
  color: #bcd9c7;
  font-size: 13px;
  font-weight: 700;
}

.hero-copy h2 {
  max-width: 760px;
  margin: 0;
  font-size: clamp(46px, 7vw, 78px);
  line-height: 1;
  letter-spacing: 0;
}

.hero-copy p {
  max-width: 560px;
  margin: 16px 0 0;
  color: #d8e3dc;
  line-height: 1.7;
}

.home-stats {
  width: min(720px, 100%);
  max-width: 100%;
  min-width: 0;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  align-content: center;
}

.home-stats div {
  min-width: 0;
  min-height: 94px;
  display: grid;
  align-content: center;
  justify-items: center;
  padding: 14px 10px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.075);
  backdrop-filter: blur(10px);
}

.home-stats strong {
  display: block;
  font-size: clamp(28px, 4vw, 40px);
  line-height: 1;
}

.home-stats span {
  display: block;
  margin-top: 8px;
  color: #cbd8d0;
  font-size: 13px;
}

.quick-routes {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 10px;
  width: min(980px, 100%);
  max-width: 100%;
  min-width: 0;
  margin: 0 auto;
  animation: enterUp 520ms ease 80ms both;
}

.route-card {
  min-width: 0;
  min-height: 78px;
  display: grid;
  place-items: center;
  padding: 14px 10px;
  text-align: center;
  background: #fbfcf8;
}

.route-card:hover,
.topic-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 24px rgba(29, 37, 32, 0.1);
}

.route-card strong,
.route-card span {
  display: block;
}

.route-card strong {
  font-size: 17px;
}

.route-card span {
  margin-top: 8px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.45;
}

.section-lead {
  margin-bottom: 14px;
}

.section-lead h3,
.section-lead p {
  margin: 0;
}

.section-lead h3 {
  font-size: 24px;
}

.section-lead p {
  margin-top: 6px;
  color: var(--muted);
}

.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 10px;
}

.topic-card {
  min-height: 132px;
  padding: 16px;
  text-align: left;
  background: #fbfcf8;
}

.topic-card span,
.topic-card strong,
.topic-card em {
  display: block;
}

.topic-card span {
  color: var(--blue);
  font-size: 12px;
  font-weight: 800;
}

.topic-card strong {
  margin-top: 10px;
  min-height: 44px;
  line-height: 1.35;
}

.topic-card em {
  margin-top: 12px;
  color: var(--muted);
  font-style: normal;
}

.topic-card.active {
  border-color: var(--green);
  box-shadow: inset 4px 0 0 var(--green);
}

.practice-toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.practice-toolbar span {
  color: var(--muted);
  font-size: 14px;
}

@keyframes enterUp {
  from {
    transform: translateY(14px);
  }
  to {
    transform: translateY(0);
  }
}

@keyframes logoBar {
  0%,
  100% {
    transform: scaleY(0.84);
  }
  45% {
    transform: scaleY(1);
  }
}

@keyframes panelSheen {
  from {
    background-position: 0 0, 0 0, 0 0;
  }
  to {
    background-position: 34px 0, 0 34px, 56px 0;
  }
}

@media (max-width: 980px) {
  .app-header,
  .home-panel,
  .practice-layout {
    grid-template-columns: 1fr;
  }

  .app-header {
    position: static;
    grid-template-columns: minmax(0, 1fr);
    padding: 14px;
  }

  .top-nav,
  .quick-routes {
    grid-template-columns: repeat(3, 1fr);
  }

  .topbar {
    align-items: stretch;
    flex-direction: column;
  }

  .question-map {
    position: static;
    max-height: 176px;
    grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
  }
}

@media (max-width: 620px) {
  body {
    overflow-x: hidden;
  }

  .app-shell.view-home .main {
    min-height: auto;
    align-content: start;
  }

  .app-header {
    width: 100vw;
    max-width: 100vw;
    overflow: hidden;
  }

  .main {
    width: calc(100vw - 24px);
    max-width: calc(100vw - 24px);
    padding: 16px 0 28px;
  }

  .top-nav,
  .metrics,
  .stats-row,
  .answer-grid {
    grid-template-columns: 1fr 1fr;
  }

  .top-nav {
    width: calc(100vw - 28px);
    max-width: calc(100vw - 28px);
    justify-self: center;
  }

  .quick-routes,
  .home-stats {
    grid-template-columns: 1fr 1fr;
  }

  .quick-routes {
    width: calc(100vw - 24px);
    max-width: calc(100vw - 24px);
  }

  .home-panel {
    width: calc(100vw - 24px);
    max-width: calc(100vw - 24px);
    padding: 34px 16px 28px;
  }

  .home-stats {
    width: calc(100vw - 56px);
    max-width: calc(100vw - 56px);
  }

  .hero-copy h2 {
    font-size: 40px;
  }

  .topbar h2 {
    font-size: 23px;
  }

  .exam-banner {
    align-items: stretch;
    flex-direction: column;
  }

  .question-panel,
  .exam-question,
  .exam-result,
  .source-panel,
  .empty-state {
    padding: 14px;
  }

  h3 {
    font-size: 19px;
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 1ms !important;
    animation-iteration-count: 1 !important;
    scroll-behavior: auto !important;
    transition-duration: 1ms !important;
  }
}

/* merged single-version shell */
html {
  overflow-x: hidden;
}

body {
  overflow-x: hidden;
  background:
    linear-gradient(90deg, rgba(24, 71, 55, 0.045) 1px, transparent 1px) 0 0 / 26px 26px,
    linear-gradient(180deg, rgba(24, 71, 55, 0.035) 1px, transparent 1px) 0 0 / 26px 26px,
    #f5f8f3;
}

.app-shell-v2 {
  min-height: 100svh;
}

.main-v2 {
  width: min(1120px, calc(100vw - 32px));
  margin: 0 auto;
  padding: 28px 0 44px;
}

.view-home .main-v2 {
  min-height: 100svh;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  justify-items: center;
  align-content: center;
  padding: clamp(24px, 4vh, 48px) 0;
}

.pagebar-v2,
.home-panel,
.quick-routes,
.topic-select,
.practice-toolbar,
.practice-layout,
.exam-panel,
.history-list,
.source-panel,
.empty-state {
  width: min(100%, 980px);
  margin-left: auto;
  margin-right: auto;
}

.pagebar-v2 {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

.pagebar-v2 h2 {
  margin: 0;
  overflow: hidden;
  font-size: clamp(22px, 4vw, 32px);
  line-height: 1.2;
  text-align: left;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.back-v2 {
  min-height: 44px;
  padding: 0 16px;
  border-color: #bed0c6;
  background: rgba(255, 255, 255, 0.9);
  font-weight: 800;
}

.back-v2::before {
  content: "‹";
  margin-right: 6px;
  font-size: 22px;
  line-height: 0;
  vertical-align: -1px;
}

.home-panel {
  width: min(920px, 100%);
  min-width: 0;
  padding: clamp(34px, 8vw, 72px) clamp(18px, 6vw, 56px);
  border: 0;
  border-radius: 14px;
  background:
    radial-gradient(circle at 18% 10%, rgba(123, 198, 145, 0.22), transparent 34%),
    linear-gradient(145deg, #12241e 0%, #1b3c31 58%, #244d3e 100%);
  box-shadow: 0 18px 42px rgba(21, 50, 39, 0.16);
}

.home-panel::before {
  z-index: 0;
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px) 0 0 / 32px 32px,
    linear-gradient(180deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px) 0 0 / 32px 32px;
  animation: none;

      answer: fillAnswer("ID3 用信息增益；C4.5 用增益率；CART 用基尼指数；预剪枝生长中停止；后剪枝全树再修剪", ["信息增益", "增益率", "基尼", "预剪枝", "后剪枝"]),
      explanation: "题干本身列出了各算法划分准则和两类剪枝方式，按原句补全即可。"
    },
    "af4-fill-010": {
      topic: "naive_bayes",
      answer: fillAnswer("P̂(c)=5/13；P̂(x=1|c)=1/6", ["5/13", "1/6"]),
      explanation: "用拉普拉斯修正：类别先验为 (4+1)/(10+3)=5/13；条件概率为 (0+1)/(4+2)=1/6。"
    },
    "af4-fill-011": {
      answer: fillAnswer("预剪枝；欠拟合；后剪枝；留出法", ["预剪枝", "欠拟合", "后剪枝", "留出法"]),
      explanation: "预剪枝提前停止分支，可能欠拟合；后剪枝先生成全树再修剪；剪枝评估常用留出验证集。"
    },
    "af4-fill-013": {
      topic: "tree_ensemble",
      answer: fillAnswer("预剪枝；后剪枝", ["预剪枝", "后剪枝"]),
      explanation: "生长中提前停止是预剪枝；全树生成后再修剪是后剪枝。"
    },
    "af4-fill-015": {
      topic: "naive_bayes",
      answer: fillAnswer("P(y=1)P(x1|y=1)P(x2|y=1)", ["P(y=1)", "P(x1|y=1)", "P(x2|y=1)"]),
      explanation: "朴素贝叶斯按条件独立假设分解后验概率的正比例项。"
    }
  };

  window.ANSWER_OVERRIDES = overrides;
  const questions = window.QUESTION_BANK || [];
  const byId = new Map(questions.map((question) => [question.id, question]));
  Object.entries(overrides).forEach(([id, patch]) => {
    const question = byId.get(id);
    if (!question) return;
    Object.assign(question, patch);
    question.answerPending = false;
    if (!Object.prototype.hasOwnProperty.call(patch, "sourceTextMissing")) {
      question.sourceTextMissing = false;
    }
  });
})();

</script>
<script>
(function () {
  const storageKey = "ds-final-review-state-v1";

  const app = document.getElementById("app");
  if (new URLSearchParams(window.location.search).has("reset")) {
    localStorage.removeItem(storageKey);
    try {
      window.history.replaceState({}, "", window.location.href.split("?")[0]);
    } catch {
      // file:// pages may restrict history updates in some browsers.
    }
  }
  const state = loadState();
  const topics = window.TOPICS || [];
  const questions = window.QUESTION_BANK || [];
  const questionNumbers = new Map(questions.map((question, index) => [question.id, index + 1]));

  const viewState = {
    tab: "home",
    topic: "all",
    questionIndex: 0,
    practiceStage: "topics",
    lastResult: null,
    examAnswers: {},
    examResult: null
  };

  const routeTabs = new Set(["home", "practice", "mistakes", "favorites", "exam", "history", "sources"]);
  let routeStack = [];

  function applyRouteFromLocation() {
    const parts = decodeURIComponent(window.location.hash.replace(/^#/, "")).split("/").filter(Boolean);
    const tab = routeTabs.has(parts[0]) ? parts[0] : "home";
    viewState.tab = tab;
    viewState.questionIndex = 0;
    viewState.lastResult = null;
    viewState.examResult = null;
    if (tab === "practice") {
      const topic = parts[1] && (parts[1] === "all" || topics.some((item) => item.id === parts[1])) ? parts[1] : "all";
      viewState.topic = topic;
      viewState.practiceStage = parts[1] ? "questions" : "topics";
    } else {
      viewState.topic = "all";
      viewState.practiceStage = "topics";
    }
  }

  function currentRouteHash() {
    if (viewState.tab === "practice" && viewState.practiceStage === "questions") {
      return `#practice/${encodeURIComponent(viewState.topic)}`;
    }
    return `#${viewState.tab}`;
  }

  function writeRoute(replace = false) {
    const hash = currentRouteHash();
    if (window.location.hash === hash) return;
    try {
      window.history[replace ? "replaceState" : "pushState"]({}, "", hash);
      if (replace) {
        if (routeStack.length) routeStack[routeStack.length - 1] = hash;
        else routeStack.push(hash);
      } else {
        routeStack.push(hash);
      }
    } catch {
      window.location.hash = hash;
    }
  }

  function syncRouteStackFromLocation() {
    const hash = window.location.hash || currentRouteHash();
    const index = routeStack.lastIndexOf(hash);
    if (index >= 0) {
      routeStack = routeStack.slice(0, index + 1);
    } else {
      routeStack = [hash];
    }
  }

  function parentRoute() {
    if (viewState.tab === "practice" && viewState.practiceStage === "questions") {
      return { tab: "practice", topic: "all", practiceStage: "topics" };
    }
    if (viewState.tab !== "home") {
      return { tab: "home", topic: "all", practiceStage: "topics" };
    }
    return null;
  }

  function applyRoute(route) {
    viewState.tab = route.tab;
    viewState.topic = route.topic || "all";
    viewState.practiceStage = route.practiceStage || "topics";
    viewState.questionIndex = 0;
    viewState.lastResult = null;
    viewState.examResult = null;
  }

  function goBack() {
    if (routeStack.length > 1) {
      window.history.back();
      return;
    }
    const route = parentRoute();
    if (!route) return;
    applyRoute(route);
    writeRoute(true);
    render();
  }

  function loadState() {
    try {
      const parsed = JSON.parse(localStorage.getItem(storageKey));
      return stripSiteStats(parsed || blankState());
    } catch {
      return blankState();
    }
  }

  function stripSiteStats(nextState) {
    Object.values(nextState.stats || {}).forEach((item) => {
      delete item.siteAttempts;
      delete item.siteCorrect;
    });
    return nextState;
  }

  function blankState() {
    return {
      favorites: [],
      mistakes: [],
      stats: {},
      sessions: []
    };
  }

  function saveState() {
    localStorage.setItem(storageKey, JSON.stringify(state));
  }

  function sourceLabel(question) {
    const source = question.source || {};
    const file = window.SOURCE_FILES[source.sourceId] || {};
    return `${file.originalFile || source.sourceId} · p.${source.page || "?"} · ${source.section || ""} ${source.question || ""}`;
  }

  function topicName(id) {
    return (topics.find((topic) => topic.id === id) || {}).name || id;
  }

  function questionsForCurrentView() {
    let list = questions.slice();
    if (viewState.tab === "mistakes") {
      list = list.filter((question) => state.mistakes.includes(question.id));
    } else if (viewState.tab === "favorites") {
      list = list.filter((question) => state.favorites.includes(question.id));
    }
    if (viewState.topic !== "all") {
      list = list.filter((question) => question.topic === viewState.topic);
    }
    return list;
  }

  function render() {
    app.innerHTML = `
      <div class="app-shell-v2 view-${viewState.tab}">
        <main class="main-v2">
          ${viewState.tab === "home" ? "" : renderPageBar()}
          ${renderMainPanel()}
        </main>
      </div>
    `;

    app.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => {
        viewState.tab = button.dataset.tab;
        viewState.questionIndex = 0;
        viewState.lastResult = null;
        viewState.examResult = null;
        viewState.practiceStage = viewState.tab === "practice" ? "topics" : "questions";
        if (viewState.tab !== "practice") viewState.topic = "all";
        writeRoute();
        render();
      });
    });

    app.querySelectorAll("[data-topic]").forEach((button) => {
      button.addEventListener("click", () => {
        viewState.topic = button.dataset.topic;
        viewState.questionIndex = 0;
        viewState.lastResult = null;
        viewState.practiceStage = "questions";
        writeRoute();
        render();
      });
    });

    app.querySelectorAll("[data-go-back]").forEach((button) => {
      button.addEventListener("click", goBack);
    });

    const backTopics = app.querySelector("[data-back-topics]");
    if (backTopics) {
      backTopics.addEventListener("click", () => {
        goBack();
      });
    }

    bindPracticeEvents();
    bindExamEvents();
  }

  function tabButton(tab, label) {
    return `<button class="nav-button ${viewState.tab === tab ? "active" : ""}" data-tab="${tab}">${label}</button>`;
  }

  function renderPageBar() {
    return `
      <header class="pagebar-v2">
        <button class="back-v2" data-go-back aria-label="返回上一级">返回</button>
        <h2>${currentTitle()}</h2>
      </header>
    `;
  }

  function topicButton(id, label, count) {
    return `<button class="topic-button ${viewState.topic === id ? "active" : ""}" data-topic="${id}">
      <span>${label}</span><strong>${count}</strong>
    </button>`;
  }

  function renderHeader() {
    const totalAttempts = Object.values(state.stats).reduce((sum, item) => sum + (item.personalAttempts || 0), 0);
    const totalCorrect = Object.values(state.stats).reduce((sum, item) => sum + (item.personalCorrect || 0), 0);
    const rate = totalAttempts ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
    return `
      <header class="topbar">
        <div>
          <h2>${currentTitle()}</h2>
          ${currentSubtitle() ? `<p>${currentSubtitle()}</p>` : ""}
        </div>
        <div class="metrics">
          <div><span>${questions.length}</span><label>题目</label></div>
          <div><span>${state.mistakes.length}</span><label>错题</label></div>
          <div><span>${state.favorites.length}</span><label>收藏</label></div>
          <div><span>${rate}%</span><label>正确率</label></div>
        </div>
      </header>
    `;
  }

  function currentTitle() {
    if (viewState.tab === "practice") {
      return viewState.practiceStage === "topics" ? "选择知识点" : topicName(viewState.topic);
    }
    const map = {
      home: "Final Review",
      mistakes: "错题本",
      favorites: "收藏夹",
      exam: "预测卷",
      history: "训练记录",
      sources: "PDF 来源"
    };
    return map[viewState.tab];
  }

  function currentSubtitle() {
    return "";
  }

  function renderMainPanel() {
    if (viewState.tab === "home") return renderHome();
    if (viewState.tab === "practice" && viewState.practiceStage === "topics") return renderTopicSelection();
    if (viewState.tab === "exam") return renderExam();
    if (viewState.tab === "history") return renderHistory();
    if (viewState.tab === "sources") return renderSources();
    return renderPracticePanel();
  }

  function renderHome() {
    const totalAttempts = Object.values(state.stats).reduce((sum, item) => sum + (item.personalAttempts || 0), 0);
    const totalCorrect = Object.values(state.stats).reduce((sum, item) => sum + (item.personalCorrect || 0), 0);
    const personalRate = totalAttempts ? `${Math.round((totalCorrect / totalAttempts) * 100)}%` : "0%";
    return `
      <section class="home-panel">
        <div class="hero-copy">
          <h2>Final Review</h2>
        </div>
        <div class="home-stats">
          <div><strong>${questions.length}</strong><span>总题数</span></div>
          <div><strong>${state.mistakes.length}</strong><span>错题</span></div>
          <div><strong>${state.favorites.length}</strong><span>收藏</span></div>
          <div><strong>${personalRate}</strong><span>本人正确率</span></div>
        </div>
      </section>
      <section class="quick-routes">
        ${homeRoute("practice", "开始练习")}
        ${homeRoute("mistakes", "错题本")}
        ${homeRoute("favorites", "收藏夹")}
        ${homeRoute("exam", "预测卷")}
        ${homeRoute("history", "训练记录")}
        ${homeRoute("sources", "PDF 来源")}
      </section>
    `;
  }

  function homeRoute(tab, title) {
    return `<button class="route-card" data-tab="${tab}">
      <strong>${title}</strong>
    </button>`;
  }

  function renderTopicSelection() {
    const topicCards = [
      { id: "all", name: "全部知识点", group: "总览", count: questions.length },
      ...topics.map((topic) => ({
        ...topic,
        count: questions.filter((question) => question.topic === topic.id).length
      }))
    ];
    return `
      <section class="topic-select">
        <div class="section-lead">
          <h3>选择知识点</h3>
        </div>
        <div class="topic-grid">
          ${topicCards
            .map((topic) => `<button class="topic-card ${viewState.topic === topic.id ? "active" : ""}" data-topic="${topic.id}">
              <span>${topic.group || "知识点"}</span>
              <strong>${topic.name}</strong>
              <em>${topic.count} 题</em>
            </button>`)
            .join("")}
        </div>
      </section>
    `;
  }

  function renderPracticePanel() {
    const list = questionsForCurrentView();
    if (!list.length) {
      return `<section class="empty-state">当前条件下没有题目。</section>`;
    }

    viewState.questionIndex = Math.max(0, Math.min(viewState.questionIndex, list.length - 1));
    const question = list[viewState.questionIndex];
    const stats = state.stats[question.id] || {};
    const personalAttempts = stats.personalAttempts || 0;
    const personalCorrect = stats.personalCorrect || 0;

    return `
      ${viewState.tab === "practice" ? `<div class="practice-toolbar">
        <button data-back-topics>切换知识点</button>
        <span>${topicName(viewState.topic)} · ${list.length} 题</span>
      </div>` : ""}
      <section class="practice-layout">
        <div class="question-map" aria-label="题号导航">
          ${list
            .map((item, index) => `<button class="${index === viewState.questionIndex ? "active" : ""}" data-jump="${index}">
              <span>${questionNumber(item)}</span>
            </button>`)
            .join("")}
        </div>
        <article class="question-panel">
          <div class="question-meta">
            <span>第 ${questionNumber(question)} 题</span>
            <span>${topicName(question.topic)}</span>
            <span>${typeLabel(question.type)}</span>
            <span class="difficulty-pill ${difficultyClass(question.difficulty)}">${difficultyLabel(question.difficulty)}</span>
          </div>
          <h3>${escapeHtml(question.stem)}</h3>
          ${renderInput(question, "practice")}
          <div class="actions">
            <button class="primary" data-submit-practice="${question.id}">提交</button>
            <button data-prev-question>上一题</button>
            <button data-next-question>下一题</button>
            <button data-toggle-favorite="${question.id}">${state.favorites.includes(question.id) ? "取消收藏" : "收藏"}</button>
          </div>
          ${renderLastResult(question)}
          <div class="stats-row">
            <div><span>${personalAttempts}</span><label>本人次数</label></div>
            <div><span>${rate(personalCorrect, personalAttempts)}</span><label>本人正确率</label></div>
          </div>
          <footer class="source-line">${sourceLabel(question)}</footer>
        </article>
      </section>
    `;
  }

  function typeLabel(type) {
    return {
      true_false: "判断",
      single_choice: "单选",
      multiple_choice: "多选",
      fill: "填空",
      open: "开放"
    }[type];
  }

  function questionNumber(question) {
    return questionNumbers.get(question.id) || questions.indexOf(question) + 1;
  }

  function difficultyLabel(difficulty) {
    return {
      easy: "简单",
      medium: "中等",
      hard: "困难"
    }[difficulty] || "中等";
  }

  function difficultyClass(difficulty) {
    return {
      easy: "difficulty-easy",
      medium: "difficulty-medium",
      hard: "difficulty-hard"
    }[difficulty] || "difficulty-medium";
  }

  function renderInput(question, scope) {
    const name = `${scope}-${question.id}`;
    if (question.type === "true_false") {
      return `
        <div class="answer-grid">
          <label><input type="radio" name="${name}" value="true" /> 正确</label>
          <label><input type="radio" name="${name}" value="false" /> 错误</label>
        </div>
      `;
    }
    if (question.type === "single_choice") {
      if (!Array.isArray(question.options) || !question.options.length) {
        return `<textarea name="${name}" rows="4" placeholder="该选择题的选项未能从 PDF 文本中提取，请查看原 PDF 后作答"></textarea>`;
      }
      return `<div class="option-stack">${question.options
        .map((option) => `<label><input type="radio" name="${name}" value="${option.key}" /> <strong>${option.key}</strong>. ${escapeHtml(option.text)}</label>`)
        .join("")}</div>`;
    }
    if (question.type === "multiple_choice") {
      if (!Array.isArray(question.options) || !question.options.length) {
        return `<textarea name="${name}" rows="4" placeholder="该多选题的选项未能从 PDF 文本中提取，请查看原 PDF 后作答"></textarea>`;
      }
      return `<div class="option-stack">${question.options
        .map((option) => `<label><input type="checkbox" name="${name}" value="${option.key}" /> <strong>${option.key}</strong>. ${escapeHtml(option.text)}</label>`)
        .join("")}</div>`;
    }
    if (question.type === "open") {
      return `<textarea name="${name}" rows="7" placeholder="输入作答"></textarea>`;
    }
    return `<input class="text-answer" name="${name}" placeholder="输入答案" />`;
  }

  function renderLastResult(question) {
    const result = viewState.lastResult;
    if (!result || result.questionId !== question.id) return "";
    const resultClass = result.pending ? "pending" : result.correct ? "correct" : "wrong";
    return `
      <div class="result ${resultClass}">
        <p><strong>参考答案：</strong>${formatAnswer(question)}</p>
        <p>${escapeHtml(question.explanation || "")}</p>
      </div>
    `;
  }

  function bindPracticeEvents() {
    app.querySelectorAll("[data-jump]").forEach((button) => {
      button.addEventListener("click", () => {
        viewState.questionIndex = Number(button.dataset.jump);
        viewState.lastResult = null;
        render();
      });
    });

    const previous = app.querySelector("[data-prev-question]");
    if (previous) {
      previous.addEventListener("click", () => {
        viewState.questionIndex = Math.max(0, viewState.questionIndex - 1);
        viewState.lastResult = null;
        render();
      });
    }

    const next = app.querySelector("[data-next-question]");
    if (next) {
      next.addEventListener("click", () => {
        const list = questionsForCurrentView();
        viewState.questionIndex = Math.min(list.length - 1, viewState.questionIndex + 1);
        viewState.lastResult = null;
        render();
      });
    }

    const favorite = app.querySelector("[data-toggle-favorite]");
    if (favorite) {
      favorite.addEventListener("click", () => {
        toggleArray(state.favorites, favorite.dataset.toggleFavorite);
        saveState();
        render();
      });
    }

    const submit = app.querySelector("[data-submit-practice]");
    if (submit) {
      submit.addEventListener("click", () => {
        const question = questions.find((item) => item.id === submit.dataset.submitPractice);
        const userAnswer = readAnswer(question, "practice");
        const correct = checkAnswer(question, userAnswer);
        if (correct !== null) {
          recordAttempt(question.id, correct);
          if (!correct && !state.mistakes.includes(question.id)) state.mistakes.push(question.id);
        }
        viewState.lastResult = { questionId: question.id, correct, pending: correct === null };
        saveState();
        render();
      });
    }
  }

  function toggleArray(array, id) {
    const index = array.indexOf(id);
    if (index >= 0) array.splice(index, 1);
    else array.push(id);
  }

  function readAnswer(question, scope) {
    const name = `${scope}-${question.id}`;
    if (question.type === "multiple_choice") {
      return Array.from(app.querySelectorAll(`[name="${cssEscape(name)}"]:checked`)).map((input) => input.value);
    }
    const selected = app.querySelector(`[name="${cssEscape(name)}"]:checked`);
    if (question.type === "true_false" || question.type === "single_choice") {
      return selected ? selected.value : "";
    }
    if (selected) return selected.value;
    const text = app.querySelector(`[name="${cssEscape(name)}"]`);
    return text ? text.value.trim() : "";
  }

  function checkAnswer(question, userAnswer) {
    if (question.answerPending) return null;
    if (question.type === "true_false") return String(question.answer) === String(userAnswer);
    if (question.type === "single_choice") return question.answer === userAnswer;
    if (question.type === "multiple_choice") {
      const expected = question.answer.slice().sort().join(",");
      const actual = (userAnswer || []).slice().sort().join(",");
      return expected === actual;
    }
    const answer = question.answer || {};
    const normalized = normalize(userAnswer);
    return (answer.keywords || []).every((keyword) => normalized.includes(normalize(keyword)));
  }

  function normalize(value) {
    return String(value || "")
      .toLowerCase()
      .replace(/\s+/g, "")
      .replace(/[；;，,。.\-—_]/g, "");
  }

  function recordAttempt(questionId, correct) {
    const current = state.stats[questionId] || {
      personalAttempts: 0,
      personalCorrect: 0
    };
    current.personalAttempts += 1;
    if (correct) {
      current.personalCorrect += 1;
    }
    state.stats[questionId] = current;
  }

  function rate(correct, attempts) {
    if (!attempts) return "0%";
    return `${Math.round((correct / attempts) * 100)}%`;
  }

  function renderExam() {
    const exam = buildExam();
    return `
      <section class="exam-panel">
        <div class="exam-banner">
          <div>
            <h3>预测卷</h3>
            <p>判断 ${countBy(exam, "true_false")} / 选择 ${countChoices(exam)} / 填空 ${countBy(exam, "fill")} / 大题 ${countBy(exam, "open")}</p>
          </div>
          <button class="primary" data-submit-exam>交卷</button>
        </div>
        <div class="exam-list">
          ${exam.map((question, index) => renderExamQuestion(question, index)).join("")}
        </div>
        ${renderExamResult()}
      </section>
    `;
  }

  function buildExam() {
    const finalQuestions = questions.filter((question) => question.finalExam && !question.answerPending);
    const used = new Set();
    const select = (types, count) => {
      const typeList = Array.isArray(types) ? types : [types];
      const candidates = finalQuestions.filter((question) => typeList.includes(question.type) && !used.has(question.id));
      const selected = selectBalanced(candidates, count);
      selected.forEach((question) => used.add(question.id));
      return selected;
    };
    return [
      ...select("true_false", window.EXAM_REQUIREMENTS.finalPaperShape.trueFalse),
      ...select(["single_choice", "multiple_choice"], window.EXAM_REQUIREMENTS.finalPaperShape.choice),
      ...select("fill", window.EXAM_REQUIREMENTS.finalPaperShape.fill),
      ...select("open", window.EXAM_REQUIREMENTS.finalPaperShape.open)
    ];
  }

  function selectBalanced(candidates, count) {
    const priority = window.EXAM_REQUIREMENTS.topicPriority || topics.map((topic) => topic.id);
    const buckets = new Map();
    candidates.forEach((question) => {
      if (!buckets.has(question.topic)) buckets.set(question.topic, []);
      buckets.get(question.topic).push(question);
    });
    const orderedTopics = [
      ...priority.filter((topic) => buckets.has(topic)),
      ...Array.from(buckets.keys()).filter((topic) => !priority.includes(topic))
    ];
    const selected = [];
    while (selected.length < count) {
      let changed = false;
      for (const topic of orderedTopics) {
        const bucket = buckets.get(topic) || [];
        const next = bucket.shift();
        if (next) {
          selected.push(next);
          changed = true;
          if (selected.length === count) break;
        }
      }
      if (!changed) break;
    }
    return selected;
  }

  function renderExamQuestion(question, index) {
    return `
      <article class="exam-question">
        <div class="question-meta">
          <span>卷面 ${index + 1}</span>
          <span>题库 ${questionNumber(question)}</span>
          <span>${topicName(question.topic)}</span>
          <span>${typeLabel(question.type)}</span>
          <span class="difficulty-pill ${difficultyClass(question.difficulty)}">${difficultyLabel(question.difficulty)}</span>
          <span>${points(question)} 分</span>
        </div>
        <h3>${escapeHtml(question.stem)}</h3>
        ${renderInput(question, "exam")}
        <footer class="source-line">${sourceLabel(question)}</footer>
      </article>
    `;
  }

  function bindExamEvents() {
    const submit = app.querySelector("[data-submit-exam]");
    if (!submit) return;
    submit.addEventListener("click", () => {
      const exam = buildExam();
      let score = 0;
      let total = 0;
      const byTopic = {};
      const details = [];
      exam.forEach((question) => {
        const userAnswer = readAnswer(question, "exam");
        const correct = checkAnswer(question, userAnswer);
        const point = points(question);
        total += point;
        if (correct) score += point;
        recordAttempt(question.id, correct);
        if (!correct && !state.mistakes.includes(question.id)) state.mistakes.push(question.id);
        const topic = byTopic[question.topic] || { correct: 0, total: 0 };
        topic.total += point;
        if (correct) topic.correct += point;
        byTopic[question.topic] = topic;
        details.push({ id: question.id, correct });
      });
      const session = {
        id: `session-${Date.now()}`,
        at: new Date().toISOString(),
        score,
        total,
        byTopic,
        details
      };
      state.sessions.unshift(session);
      state.sessions = state.sessions.slice(0, 30);
      viewState.examResult = session;
      saveState();
      render();
    });
  }

  function renderExamResult() {
    const result = viewState.examResult;
    if (!result) return "";
    const weakTopics = Object.entries(result.byTopic)
      .map(([topic, item]) => ({ topic, rate: item.total ? item.correct / item.total : 0, correct: item.correct, total: item.total }))
      .sort((a, b) => a.rate - b.rate);
    return `
      <section class="exam-result">
        <h3>得分 ${result.score} / ${result.total}</h3>
        <div class="diagnosis">
          ${weakTopics
            .map((item) => `<div>
              <strong>${topicName(item.topic)}</strong>
              <span>${Math.round(item.rate * 100)}%</span>
              <p>${item.rate < 0.7 ? "专项复习优先级高" : "保持巩固"}</p>
            </div>`)
            .join("")}
        </div>
        <div class="answer-key">
          ${buildExam()
            .map((question) => `<details>
              <summary>第 ${questionNumber(question)} 题 · ${formatAnswer(question)}</summary>
              <p>${escapeHtml(question.explanation || "")}</p>
              <p>${sourceLabel(question)}</p>
            </details>`)
            .join("")}
        </div>
      </section>
    `;
  }

  function countBy(list, type) {
    return list.filter((item) => item.type === type).length;
  }

  function countChoices(list) {
    return list.filter((item) => item.type === "single_choice" || item.type === "multiple_choice").length;
  }

  function points(question) {
    if (question.type === "true_false") return 1;
    if (question.type === "multiple_choice") return 3;
    if (question.type === "single_choice" || question.type === "fill") return 2;
    return 5;
  }

  function renderHistory() {
    if (!state.sessions.length) return `<section class="empty-state">暂无记录。</section>`;
    return `
      <section class="history-list">
        ${state.sessions
          .map((session) => `<article>
            <h3>${new Date(session.at).toLocaleString()}</h3>
            <strong>${session.score} / ${session.total}</strong>
            <div class="diagnosis mini">
              ${Object.entries(session.byTopic)
                .map(([topic, item]) => `<div><span>${topicName(topic)}</span><b>${rate(item.correct, item.total)}</b></div>`)
                .join("")}
            </div>
          </article>`)
          .join("")}
      </section>
    `;
  }

  function renderSources() {
    return `
      <section class="source-panel">
        <h3>PDF 来源</h3>
        <div class="source-grid">
          ${Object.entries(window.SOURCE_FILES)
            .filter(([sourceId]) => sourceId !== "image")
            .map(([, source]) => source)
            .map((source) => `<a href="${source.file}" target="_blank">
              <strong>${source.originalFile || source.title}</strong>
              <span>${source.title}</span>
            </a>`)
            .join("")}
        </div>
      </section>
    `;
  }

  function formatAnswer(question) {
    if (question.answerPending) {
      return question.sourceTextMissing ? "待核对（PDF 文本提取为空，请查看原 PDF 对应题号）" : "待核对（原 PDF 未提供可机读标准答案）";
    }
    if (question.type === "true_false") return question.answer ? "正确" : "错误";
    if (question.type === "multiple_choice") return question.answer.join("、");
    if (question.type === "single_choice") return question.answer;
    return (question.answer.accepted || [""])[0];
  }

  function cssEscape(value) {
    return window.CSS && CSS.escape ? CSS.escape(value) : value.replace(/"/g, '\\"');
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  applyRouteFromLocation();
  routeStack = [currentRouteHash()];
  writeRoute(!window.location.hash);
  syncRouteStackFromLocation();
  window.addEventListener("popstate", () => {
    applyRouteFromLocation();
    syncRouteStackFromLocation();
    render();
  });
  render();
})();

</script>
  </body>
</html>
